<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォルダ整理エージェント PRO + UNDO (Ver.100% Fixed)</title>
    <style>
        /* モダンなCSSリセットとベーススタイル */
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 30px 20px; 
            line-height: 1.6; 
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 { 
            color: #0f172a; 
            font-size: 1.8rem;
            border-bottom: 3px solid var(--primary); 
            padding-bottom: 12px; 
            margin-bottom: 30px;
        }

        /* パネルデザイン */
        .panel { 
            background: var(--panel-bg); 
            padding: 25px 30px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); 
            margin-bottom: 25px; 
            border: 1px solid var(--border);
        }

        h3 { 
            margin-top: 0; 
            color: #1e293b; 
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        h3::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 20px;
            background-color: var(--primary);
            border-radius: 4px;
            margin-right: 10px;
        }

        /* フォーム要素 */
        label { 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: color 0.2s; 
        }
        label:hover { color: var(--primary); }
        
        input[type="checkbox"] { 
            width: 18px; 
            height: 18px; 
            margin-right: 12px; 
            accent-color: var(--primary);
            cursor: pointer;
        }

        input[type="text"] { 
            padding: 10px 14px; 
            width: 100%; 
            max-width: 300px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input[type="file"] {
            display: block;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f1f5f9;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }

        /* ボタンデザイン */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        
        button { 
            background: var(--primary); 
            color: #fff; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600; 
            transition: all 0.2s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3); }
        button:active:not(:disabled) { transform: translateY(0); }
        
        button.success { background: var(--success); }
        button.success:hover:not(:disabled) { background: var(--success-hover); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3); }
        
        button.undo { background: var(--warning); }
        button.undo:hover:not(:disabled) { background: var(--warning-hover); box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.3); }
        
        button:disabled { background: #cbd5e1; cursor: not-allowed; color: #94a3b8; }

        /* プログレスバー */
        .progress-container { 
            width: 100%; 
            background-color: #e2e8f0; 
            border-radius: 999px; 
            margin: 20px 0; 
            overflow: hidden;
            display: none; 
            height: 16px;
        }
        .progress-bar { 
            width: 0%; 
            height: 100%; 
            background-color: var(--primary); 
            transition: width 0.15s ease-out; 
        }

        /* テーブル */
        .table-wrapper {
            max-height: 250px; 
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 15px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border-bottom: 1px solid var(--border); padding: 12px 16px; text-align: left; }
        th { background-color: #f8fafc; font-weight: 600; color: var(--text-muted); position: sticky; top: 0; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f1f5f9; }

        /* テキストエリア */
        textarea { 
            width: 100%; 
            height: 120px; 
            font-family: 'Fira Code', 'Consolas', monospace; 
            padding: 16px; 
            box-sizing: border-box; 
            background: #1e293b; 
            color: #f8fafc; 
            border-radius: 8px; 
            border: none; 
            margin-top: 15px; 
            display: none; 
            resize: vertical;
            line-height: 1.5;
        }

        /* インフォボックス */
        .info-box { 
            background-color: #eff6ff; 
            border-left: 4px solid var(--primary); 
            padding: 16px; 
            border-radius: 0 8px 8px 0; 
            font-size: 14px; 
            color: #1e40af;
            margin-bottom: 15px;
        }

        /* トースト通知 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        #statusMessage { font-weight: 600; color: var(--primary); margin: 10px 0; }
    </style>
</head>
<body>

    <!-- トースト通知用コンテナ -->
    <div id="toast" class="toast">通知メッセージ</div>

    <h1>フォルダ整理エージェント PRO + UNDO</h1>

    <div class="panel">
        <h3>1. 整理ルールの設定</h3>
        <label><input type="checkbox" id="ruleSmartRename" checked> <span><b>【機能2】スマートリネーム</b> (日付付与＋ゴミ掃除)</span></label>
        <label><input type="checkbox" id="ruleDate"> <span>日付別フォルダ (2026年05月...)</span></label>
        <label><input type="checkbox" id="ruleExt" checked> <span>拡張子別フォルダ (Images, Documents...)</span></label>
        <label><input type="checkbox" id="ruleSize"> <span>サイズ別 (100MB以上を分離)</span></label>
        
        <!-- 【バグ修正】消えていたチェックボックスを復活させました -->
        <label style="margin-bottom: 4px;">
            <input type="checkbox" id="ruleKeyword"> <span>キーワード別:</span>
        </label>
        <input type="text" id="keywordInput" placeholder="例: 請求書" value="請求書">
    </div>

    <div class="panel">
        <h3>2. フォルダの分析</h3>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">整理したいフォルダ（Downloadsなど）を選択してください。</p>
        <input type="file" id="folderInput" webkitdirectory directory multiple>
        
        <div id="progressContainer" class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="statusMessage"></div>
        
        <div class="table-wrapper">
            <table id="resultTable">
                <thead><tr><th>元の名前</th><th>新しい名前</th><th>移動先</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="panel">
        <h3>3. 実行コード（整理用）</h3>
        <div class="info-box">
            分析完了後、下のボタンでコピーし、メモ帳に貼り付けて <b>execute_organize.js</b> として保存してください。
        </div>
        <div class="btn-group">
            <button id="btnPrepare" disabled>整理コードを生成</button>
            <button id="btnCopy" class="success" style="display:none;">整理コードをコピー</button>
        </div>
        <textarea id="outputScript" readonly></textarea>
    </div>

    <div class="panel">
        <h3>4. 復元コード（元に戻す用）</h3>
        <div class="info-box" style="background-color: #fffbeb; border-color: #f59e0b; color: #b45309;">
            整理を元に戻したくなった時のための保険です。同様に <b>execute_undo.js</b> として保存してください。
        </div>
        <div class="btn-group">
            <button id="btnCopyUndo" class="undo" style="display:none;">復元コードをコピー</button>
        </div>
        <textarea id="outputUndoScript" readonly></textarea>
    </div>

<script>
    const extMap = {
        '.jpg': 'Images', '.png': 'Images', '.gif': 'Images', '.jpeg': 'Images',
        '.pdf': 'Documents', '.doc': 'Documents', '.docx': 'Documents', '.txt': 'Documents', '.xlsx': 'Documents',
        '.zip': 'Archives', '.rar': 'Archives', '.exe': 'Apps'
    };

    let simulationData = [];

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 【修正】ローカルHTMLファイルでも確実にコピーできるよう安全設計を追加
    async function copyToClipboard(elementId, successMessage) {
        const textarea = document.getElementById(elementId);
        const text = textarea.value;
        
        try {
            // navigator.clipboardが存在するかチェック
            if (!navigator.clipboard) {
                throw new Error("Clipboard API not available");
            }
            await navigator.clipboard.writeText(text);
            showToast(successMessage);
        } catch (err) {
            // 古い方式（フォールバック）で確実にコピーする
            textarea.select();
            document.execCommand('copy');
            // 選択状態を解除して見た目を綺麗にする
            window.getSelection().removeAllRanges();
            showToast(successMessage + " (コピー完了)");
        }
    }

    function escapeJS(str) {
        let res = "";
        for (let i = 0; i < str.length; i++) {
            let code = str.charCodeAt(i);
            if (str[i] === '\\') res += '\\\\';
            else if (str[i] === '"') res += '\\"';
            else if (code > 127) res += '\\u' + code.toString(16).padStart(4, '0');
            else res += str[i];
        }
        return res;
    }

    function applySmartRename(filename, lastModified) {
        let extIndex = filename.lastIndexOf(".");
        let ext = extIndex !== -1 ? filename.slice(extIndex + 1) : "";
        let base = extIndex !== -1 ? filename.substring(0, extIndex) : filename;
        
        base = base.replace(/^(Copy of |コピー\s?～\s?|副本\s?)/i, '')
                   .replace(/(\s?-\s?コピー|\s?のコピー|\(\d+\))$/i, '')
                   .replace(/[_-]+/g, ' ').trim();
                   
        const d = new Date(lastModified);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        return ext ? `${dateStr}_${base}.${ext}` : `${dateStr}_${base}`;
    }

    document.getElementById('folderInput').addEventListener('change', async function(event) {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;

        const tableBody = document.querySelector('#resultTable tbody');
        const statusMessage = document.getElementById('statusMessage');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        
        tableBody.innerHTML = '';
        simulationData = [];
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        document.getElementById('btnPrepare').disabled = true;
        
        document.getElementById('outputScript').style.display = 'none';
        document.getElementById('outputUndoScript').style.display = 'none';
        document.getElementById('btnCopy').style.display = 'none';
        document.getElementById('btnCopyUndo').style.display = 'none';

        const useSmart = document.getElementById('ruleSmartRename').checked;
        const useSize = document.getElementById('ruleSize').checked;
        const useKeyword = document.getElementById('ruleKeyword').checked;
        const keywordVal = document.getElementById('keywordInput').value;
        const useDate = document.getElementById('ruleDate').checked;
        const useExt = document.getElementById('ruleExt').checked;

        let usedNames = {};
        let tableHTML = ""; 

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            if(file.name.startsWith('.')) continue;

            if (i % 50 === 0 || i === files.length - 1) {
                const percent = Math.round(((i + 1) / files.length) * 100);
                progressBar.style.width = percent + '%';
                statusMessage.innerText = `分析中... (${i + 1} / ${files.length})`;
                await new Promise(resolve => setTimeout(resolve, 0));
            }

            let targetFolder = 'Others';
            let ext = "." + file.name.slice((file.name.lastIndexOf(".") - 1 >>> 0) + 2).toLowerCase();

            if (useSize && file.size > 100 * 1024 * 1024) {
                targetFolder = 'Large_Files';
            } else if (useKeyword && keywordVal && file.name.includes(keywordVal)) {
                targetFolder = "Keyword_" + keywordVal;
            } else if (useDate) {
                const d = new Date(file.lastModified);
                targetFolder = d.getFullYear() + "\u5e74" + ("0" + (d.getMonth() + 1)).slice(-2) + "\u6708";
            } else if (useExt) {
                targetFolder = extMap[ext] || 'Others';
            }

            let finalName = useSmart ? applySmartRename(file.name, file.lastModified) : file.name;
            let checkKey = targetFolder + '/' + finalName;
            
            if (usedNames[checkKey]) {
                let count = 1;
                let extIndex = finalName.lastIndexOf('.');
                let base = extIndex !== -1 ? finalName.substring(0, extIndex) : finalName;
                let dotExt = extIndex !== -1 ? finalName.substring(extIndex) : "";
                
                while (usedNames[targetFolder + '/' + base + '(' + count + ')' + dotExt]) {
                    count++;
                }
                finalName = base + '(' + count + ')' + dotExt;
            }
            usedNames[targetFolder + '/' + finalName] = true;

            simulationData.push({ f: file.name, d: targetFolder, t: finalName });

            if (i < 50) {
                tableHTML += `<tr><td>${file.name}</td><td>${finalName}</td><td>${targetFolder}</td></tr>`;
            }
        }
        
        tableBody.innerHTML = tableHTML;
        if(files.length > 50) {
            tableBody.innerHTML += `<tr><td colspan="3" style="text-align: center; color: #64748b;">...他 ${simulationData.length - 50} 件のファイル</td></tr>`;
        }
        
        statusMessage.innerText = `分析完了！ ${simulationData.length} 件の準備ができました。`;
        document.getElementById('btnPrepare').disabled = false;
        setTimeout(() => progressContainer.style.display = 'none', 500);
    });

    function buildScript(isUndo) {
        let lines = [
            'var fso = new ActiveXObject("Scripting.FileSystemObject");',
            'var cur = fso.GetParentFolderName(WScript.ScriptFullName);',
            'var plan = ['
        ];
        
        simulationData.forEach((item, index) => {
            const comma = index < simulationData.length - 1 ? ',' : '';
            lines.push(`  {f:"${escapeJS(item.f)}", d:"${escapeJS(item.d)}", t:"${escapeJS(item.t)}"}${comma}`);
        });
        
        lines.push('];');
        lines.push('var ok=0, ng=0;');
        lines.push('for(var i=0; i<plan.length; i++){');
        lines.push('  var p=plan[i]; if(!p)continue;');
        
        if (isUndo) {
            lines.push('  var targetPath = fso.BuildPath(fso.BuildPath(cur, p.d), p.t);');
            lines.push('  var originalPath = fso.BuildPath(cur, p.f);');
            lines.push('  if(fso.FileExists(targetPath)){');
            lines.push('    try { fso.MoveFile(targetPath, originalPath); ok++; } catch(e){ ng++; }');
            lines.push('  }');
        } else {
            lines.push('  var fp=fso.BuildPath(cur, p.f), dp=fso.BuildPath(cur, p.d), tp=fso.BuildPath(dp, p.t);');
            lines.push('  if(fso.FileExists(fp)){');
            lines.push('    if(!fso.FolderExists(dp)) fso.CreateFolder(dp);');
            lines.push('    try { fso.MoveFile(fp, tp); ok++; } catch(e){ ng++; }');
            lines.push('  }');
        }
        
        lines.push('}');
        const successMsg = isUndo ? '\\u5fa9\\u5143\\u5b8c\\u4e86' : '\\u6210\\u529f'; 
        lines.push(`WScript.Echo("${successMsg}: "+ok+"\\u4ef6\\n\\u5931\\u6557: "+ng+"\\u4ef6");`);
        
        return lines.join('\n');
    }

    document.getElementById('btnPrepare').addEventListener('click', function() {
        const orgScript = buildScript(false);
        const undoScript = buildScript(true);

        const outScript = document.getElementById('outputScript');
        const outUndo = document.getElementById('outputUndoScript');
        
        outScript.value = orgScript;
        outUndo.value = undoScript;
        
        outScript.style.display = 'block';
        outUndo.style.display = 'block';
        
        document.getElementById('btnCopy').style.display = 'flex';
        document.getElementById('btnCopyUndo').style.display = 'flex';
        
        showToast("コードの生成が完了しました！");
    });

    document.getElementById('btnCopy').addEventListener('click', () => copyToClipboard('outputScript', '整理コードをコピーしました！'));
    document.getElementById('btnCopyUndo').addEventListener('click', () => copyToClipboard('outputUndoScript', '復元コードをコピーしました！'));
</script>
</body>
</html>
