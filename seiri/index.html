<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最終究極版：フォルダ整理エージェント PRO + UNDO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; line-height: 1.6; }
        h1 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .panel { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #34495e; border-left: 5px solid #3498db; padding-left: 10px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; cursor: pointer; }
        input[type="checkbox"] { transform: scale(1.2); margin-right: 10px; }
        input[type="text"] { padding: 8px; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #3498db; color: #fff; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s; margin-top: 10px; }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        button.success { background: #2ecc71; }
        button.undo { background: #e67e22; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }
        
        .progress-container { width: 100%; background-color: #eee; border-radius: 10px; margin: 20px 0; display: none; }
        .progress-bar { width: 0%; height: 20px; background-color: #2ecc71; border-radius: 10px; transition: width 0.1s; text-align: center; color: white; font-size: 12px; line-height: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background-color: #f8f9fa; }
        textarea { width: 100%; height: 100px; font-family: 'Consolas', monospace; padding: 10px; box-sizing: border-box; background: #2c3e50; color: #ecf0f1; border-radius: 8px; border: none; margin-top: 10px; display: none; }
        .info-box { background-color: #ebf5fb; border-left: 5px solid #3498db; padding: 15px; border-radius: 4px; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>フォルダ整理エージェント PRO + UNDO</h1>

    <div class="panel">
        <h3>1. 整理ルールの設定</h3>
        <label><input type="checkbox" id="ruleSmartRename" checked> <b>【機能2】スマートリネーム</b> (日付付与＋ゴミ掃除)</label>
        <label><input type="checkbox" id="ruleDate"> 日付別フォルダ (2026年05月...)</label>
        <label><input type="checkbox" id="ruleExt" checked> 拡張子別フォルダ (Images, Documents...)</label>
        <label><input type="checkbox" id="ruleSize"> サイズ別 (100MB以上を分離)</label>
        <label><input type="checkbox" id="ruleKeyword"> キーワード別:</label>
        <input type="text" id="keywordInput" placeholder="例: 請求書" value="請求書">
    </div>

    <div class="panel">
        <h3>2. フォルダの分析</h3>
        <p>整理したいフォルダ（Downloadsなど）を選択してください。</p>
        <input type="file" id="folderInput" webkitdirectory directory multiple>
        
        <div id="progressContainer" class="progress-container">
            <div id="progressBar" class="progress-bar">0%</div>
        </div>
        <div id="statusMessage" style="font-weight: bold; color: #2980b9; margin: 10px 0;"></div>
        
        <div style="max-height: 200px; overflow-y: auto;">
            <table id="resultTable">
                <thead><tr><th>元の名前</th><th>新しい名前</th><th>移動先</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="panel">
        <h3>3. 実行コード（整理用）</h3>
        <div class="info-box">
            分析完了後、下のボタンでコピーし、メモ帳に貼り付けて <b>execute_organize.js</b> として保存してください。
        </div>
        <button id="btnPrepare" disabled>整理コードを生成</button>
        <button id="btnCopy" class="success" style="display:none;">整理コードをコピー</button>
        <textarea id="outputScript" readonly></textarea>
    </div>

    <div class="panel">
        <h3>4. 復元コード（元に戻す用）<span style="color: #e67e22;">【NEW 機能13】</span></h3>
        <div class="info-box">
            整理を元に戻したくなった時のための保険です。同様に <b>execute_undo.js</b> として保存してください。
        </div>
        <button id="btnCopyUndo" class="undo" style="display:none;">復元コードをコピー</button>
        <textarea id="outputUndoScript" readonly></textarea>
    </div>

<script>
    const extMap = {
        '.jpg': 'Images', '.png': 'Images', '.gif': 'Images', '.jpeg': 'Images',
        '.pdf': 'Documents', '.doc': 'Documents', '.docx': 'Documents', '.txt': 'Documents', '.xlsx': 'Documents',
        '.zip': 'Archives', '.rar': 'Archives', '.exe': 'Apps'
    };

    let simulationData = [];

    function applySmartRename(filename, lastModified) {
        let name = filename;
        let ext = name.slice((name.lastIndexOf(".") - 1 >>> 0) + 2);
        let base = name.substring(0, name.lastIndexOf('.')) || name;
        base = base.replace(/^(Copy of |コピー\s?～\s?|副本\s?)/i, '').replace(/(\s?-\s?コピー|\s?のコピー|\(\d+\))$/i, '').replace(/[_-]+/g, ' ').trim();
        const d = new Date(lastModified);
        const dateStr = d.getFullYear() + "-" + ("0" + (d.getMonth() + 1)).slice(-2) + "-" + ("0" + d.getDate()).slice(-2);
        return dateStr + "_" + base + "." + ext;
    }

    // バグ修正済みのメインイベントリスナー
    document.getElementById('folderInput').addEventListener('change', async function(event) {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;

        const tableBody = document.querySelector('#resultTable tbody');
        const statusMessage = document.getElementById('statusMessage');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        
        tableBody.innerHTML = '';
        simulationData = [];
        progressContainer.style.display = 'block';
        document.getElementById('btnPrepare').disabled = true;

        const useSmart = document.getElementById('ruleSmartRename').checked;
        const useSize = document.getElementById('ruleSize').checked;
        const useKeyword = document.getElementById('ruleKeyword').checked;
        const keywordVal = document.getElementById('keywordInput').value;
        const useDate = document.getElementById('ruleDate').checked;
        const useExt = document.getElementById('ruleExt').checked;

        let usedNames = {};

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            if(file.name.startsWith('.')) continue;

            if (i % 20 === 0 || i === files.length - 1) {
                const percent = Math.round((i / files.length) * 100);
                progressBar.style.width = percent + '%';
                progressBar.innerText = percent + '%';
                statusMessage.innerText = "分析中... (" + (i + 1) + " / " + files.length + ")";
                await new Promise(r => setTimeout(r, 0));
            }

            let targetFolder = 'Others';
            let ext = "." + file.name.slice((file.name.lastIndexOf(".") - 1 >>> 0) + 2).toLowerCase();

            if (useSize && file.size > 100 * 1024 * 1024) targetFolder = 'Large_Files';
            else if (useKeyword && keywordVal && file.name.includes(keywordVal)) targetFolder = "Keyword_" + keywordVal;
            else if (useDate) {
                const d = new Date(file.lastModified);
                targetFolder = d.getFullYear() + "\u5e74" + ("0" + (d.getMonth() + 1)).slice(-2) + "\u6708";
            }
            else if (useExt) targetFolder = extMap[ext] || 'Others';

            let finalName = useSmart ? applySmartRename(file.name, file.lastModified) : file.name;
            let checkKey = targetFolder + '/' + finalName;
            if (usedNames[checkKey]) {
                let count = 1;
                let base = finalName.substring(0, finalName.lastIndexOf('.'));
                let dotExt = finalName.substring(finalName.lastIndexOf('.'));
                while (usedNames[targetFolder + '/' + base + '(' + count + ')' + dotExt]) count++;
                finalName = base + '(' + count + ')' + dotExt;
            }
            usedNames[checkKey] = true;

            simulationData.push({ f: file.name, d: targetFolder, t: finalName });

            if (i < 50) {
                tableBody.insertAdjacentHTML('beforeend', "<tr><td>"+file.name+"</td><td>"+finalName+"</td><td>"+targetFolder+"</td></tr>");
            }
        }
        statusMessage.innerText = "分析完了！ " + simulationData.length + " 件の準備ができました。";
        document.getElementById('btnPrepare').disabled = false;
    });

    document.getElementById('btnPrepare').addEventListener('click', function() {
        function escapeJS(str) {
            let res = "";
            for (let i = 0; i < str.length; i++) {
                let code = str.charCodeAt(i);
                if (str[i] === '\\') res += '\\\\';
                else if (str[i] === '"') res += '\\"';
                else if (code > 127) res += '\\u' + code.toString(16).padStart(4, '0');
                else res += str[i];
            }
            return res;
        }

        // --- 整理用スクリプト生成 ---
        let s = 'var fso = new ActiveXObject("Scripting.FileSystemObject");\nvar cur = fso.GetParentFolderName(WScript.ScriptFullName);\nvar plan = [\n';
        for (let i = 0; i < simulationData.length; i++) {
            let item = simulationData[i];
            s += '  {f:"' + escapeJS(item.f) + '", d:"' + escapeJS(item.d) + '", t:"' + escapeJS(item.t) + '"}';
            s += (i < simulationData.length - 1) ? ',\n' : '\n';
        }
        s += '];\nvar ok=0, ng=0;\nfor(var i=0; i<plan.length; i++){\n  var p=plan[i]; if(!p)continue;\n  var fp=fso.BuildPath(cur, p.f), dp=fso.BuildPath(cur, p.d), tp=fso.BuildPath(dp, p.t);\n  if(fso.FileExists(fp)){\n    if(!fso.FolderExists(dp)) fso.CreateFolder(dp);\n    try { fso.MoveFile(fp, tp); ok++; } catch(e){ ng++; }\n  }\n}\nWScript.Echo("\\u6210\\u529f: "+ok+"\\u4ef6\\n\\u5931\\u6557: "+ng+"\\u4ef6");';

        // --- 復元用スクリプト生成 (逆移動) ---
        let u = 'var fso = new ActiveXObject("Scripting.FileSystemObject");\nvar cur = fso.GetParentFolderName(WScript.ScriptFullName);\nvar plan = [\n';
        for (let i = 0; i < simulationData.length; i++) {
            let item = simulationData[i];
            u += '  {f:"' + escapeJS(item.f) + '", d:"' + escapeJS(item.d) + '", t:"' + escapeJS(item.t) + '"}';
            u += (i < simulationData.length - 1) ? ',\n' : '\n';
        }
        u += '];\nvar s=0;\nfor(var i=0; i<plan.length; i++){\n  var p=plan[i];\n  var targetPath = fso.BuildPath(fso.BuildPath(cur, p.d), p.t);\n  var originalPath = fso.BuildPath(cur, p.f);\n  if(fso.FileExists(targetPath)){\n    try { fso.MoveFile(targetPath, originalPath); s++; } catch(e){}\n  }\n}\nWScript.Echo("\\u5fa9\\u5143\\u5b8c\\u4e86: "+s+"\\u4ef6");';

        document.getElementById('outputScript').value = s;
        document.getElementById('outputScript').style.display = 'block';
        document.getElementById('outputUndoScript').value = u;
        document.getElementById('outputUndoScript').style.display = 'block';
        
        document.getElementById('btnCopy').style.display = 'inline-block';
        document.getElementById('btnCopyUndo').style.display = 'inline-block';
        alert("コードを生成しました！");
    });

    document.getElementById('btnCopy').addEventListener('click', function() {
        document.getElementById('outputScript').select();
        document.execCommand('copy');
        alert("整理コードをコピーしました！");
    });

    document.getElementById('btnCopyUndo').addEventListener('click', function() {
        document.getElementById('outputUndoScript').select();
        document.execCommand('copy');
        alert("復元コードをコピーしました！");
    });
</script>
</body>
</html>
