<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高度な西暦・和暦変換ツール</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7f9;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        h3 {
            margin-top: 0;
            font-size: 18px;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        select, input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--primary-color);
        }

        input[type="number"] {
            flex: 1;
        }

        .result-area {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 6px;
            min-height: 24px;
            font-weight: bold;
            text-align: center;
            font-size: 20px;
            color: var(--primary-color);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            font-weight: normal;
        }

        .info {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>西暦 ⇄ 和暦 変換ツール</h1>

    <div class="card">
        <h3>西暦 → 和暦</h3>
        <div class="input-group">
            <input type="number" id="seireki" placeholder="例: 2024" oninput="convertSeireki()">
            <span>年</span>
        </div>
        <div class="result-area" id="resultWareki">-</div>
    </div>

    <div class="card">
        <h3>和暦 → 西暦</h3>
        <div class="input-group">
            <select id="gengo" onchange="convertWareki()">
                <option value="reiwa">令和</option>
                <option value="heisei">平成</option>
                <option value="showa">昭和</option>
                <option value="taisho">大正</option>
                <option value="meiji">明治</option>
            </select>
            <input type="number" id="warekiYear" placeholder="例: 1" oninput="convertWareki()">
            <span>年</span>
        </div>
        <div class="result-area" id="resultSeireki">-</div>
        <p class="info">※ 元年は「1」を入力してください</p>
    </div>
</div>

<script>
// 元号データ定義
const GENGO_DATA = [
    { name: "令和", start: 2019, key: "reiwa" },
    { name: "平成", start: 1989, key: "heisei" },
    { name: "昭和", start: 1926, key: "showa" },
    { name: "大正", start: 1912, key: "taisho" },
    { name: "明治", start: 1868, key: "meiji" }
];

// 西暦 → 和暦
function convertSeireki() {
    const y = document.getElementById("seireki").value;
    const display = document.getElementById("resultWareki");
    
    if (!y) {
        display.textContent = "-";
        return;
    }

    const year = Number(y);
    let result = "対応外（1868年以前）";

    for (const g of GENGO_DATA) {
        if (year >= g.start) {
            const wYear = year - g.start + 1;
            const yearStr = wYear === 1 ? "元" : wYear;
            result = `${g.name}${yearStr}年`;
            break; 
        }
    }

    display.innerHTML = result;
}

// 和暦 → 西暦
function convertWareki() {
    const gKey = document.getElementById("gengo").value;
    const yVal = document.getElementById("warekiYear").value;
    const display = document.getElementById("resultSeireki");

    if (!yVal) {
        display.textContent = "-";
        return;
    }

    const n = Number(yVal);
    const g = GENGO_DATA.find(item => item.key === gKey);
    const seireki = g.start + n - 1;

    // 簡易的な期間チェック（次の元号が始まっていたら警告）
    let warning = "";
    const nextGengo = [...GENGO_DATA].reverse().find(item => item.start > g.start); 
    // ※実際にはより詳細な月日判定が必要ですが、年単位の簡易チェックを実装
    
    const currentIndex = GENGO_DATA.findIndex(item => item.key === gKey);
    if (currentIndex > 0) {
        const prevGengo = GENGO_DATA[currentIndex - 1];
        if (seireki >= prevGengo.start && n > 1) {
            warning = `<div class="error-msg">注: ${prevGengo.name}が始まっています</div>`;
        }
    }

    display.innerHTML = `${seireki}年 ${warning}`;
}

// 初期化
window.onload = () => {
    // 今日の年をデフォルトセット
    const thisYear = new Date().getFullYear();
    document.getElementById("seireki").value = thisYear;
    convertSeireki();
};
</script>

</body>
</html>
