<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>決定版：西暦・和暦・人生総合カウンター</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #e74c3c;
            --purple: #9b59b6;
            --bg: #f4f7f6;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 650px; }
        h1 { text-align: center; color: var(--primary); font-size: 24px; margin-bottom: 20px; }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        h3 { margin-top: 0; font-size: 18px; color: var(--primary); border-left: 5px solid var(--accent); padding-left: 10px; margin-bottom: 15px; }

        .input-section {
            background: #f1f4f7;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        
        input, select { 
            padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none;
        }
        input[type="number"] { width: 100px; text-align: center; }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .result-box {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .label { font-size: 11px; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 18px; font-weight: bold; }
        .highlight { color: var(--warning); font-size: 26px; }
        .days-value { color: var(--success); font-size: 22px; }
        .zodiac-value { color: var(--purple); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-size: 13px; color: #666; }
        .sub { font-size: 11px; color: #999; display: block; }

        .today-info { text-align: right; font-size: 12px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>和暦・西暦・人生カウンター</h1>
    
    <div class="today-info" id="todayText"></div>

    <div class="card">
        <h3>1. 生年月日を入力</h3>
        <div class="input-section">
            <div class="row">
                <input type="number" id="seirekiIn" value="2000" oninput="syncFromSeireki()"> <span>年</span>
                <span style="color:#999">⇄</span>
                <select id="gengoIn" onchange="syncFromWareki()">
                    <option value="reiwa">令和</option>
                    <option value="heisei">平成</option>
                    <option value="showa">昭和</option>
                    <option value="taisho">大正</option>
                    <option value="meiji">明治</option>
                </select>
                <input type="number" id="warekiYearIn" oninput="syncFromWareki()"> <span>年</span>
            </div>
            <div class="row">
                <select id="birthMonth" onchange="updateAll()"></select> <span>月</span>
                <select id="birthDay" onchange="updateAll()"></select> <span>日 生まれ</span>
            </div>
        </div>

        <div class="result-grid">
            <div class="result-box">
                <div class="label">現在の満年齢</div>
                <div class="value highlight" id="resAge">- 歳</div>
            </div>
            <div class="result-box">
                <div class="label">星座</div>
                <div class="value zodiac-value" id="resSeiza">-</div>
            </div>
            <div class="result-box">
                <div class="label">干支</div>
                <div class="value" id="resEto">-</div>
            </div>
            <div class="result-box">
                <div class="label">合計日数</div>
                <div class="value days-value" id="resDays">- 日</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>2. 学歴早見表</h3>
        <table>
            <thead>
                <tr><th>区分</th><th>入学</th><th>卒業</th></tr>
            </thead>
            <tbody id="schoolTable"></tbody>
        </table>
    </div>
</div>

<script>
const GENGO_CONFIG = [
    { name: "令和", key: "reiwa", start: 2019 },
    { name: "平成", key: "heisei", start: 1989 },
    { name: "昭和", key: "showa", start: 1926 },
    { name: "大正", key: "taisho", start: 1912 },
    { name: "明治", key: "meiji", start: 1868 }
];
const ETO_LIST = ["申", "酉", "戌", "亥", "子", "丑", "寅", "卯", "辰", "巳", "午", "未"];

// 星座データと判定
const ZODIACS = ["山羊座", "水瓶座", "魚座", "牡羊座", "牡牛座", "双子座", "蟹座", "獅子座", "乙女座", "天秤座", "蠍座", "射手座", "山羊座"];
const ZODIAC_SPLIT_DAYS = [20, 19, 21, 20, 21, 22, 23, 23, 23, 24, 23, 22];

window.onload = function() {
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth() + 1;
    const currentDay = now.getDate();

    document.getElementById('todayText').textContent = `今日は ${currentYear}年${currentMonth}月${currentDay}日 です`;

    const mSelect = document.getElementById('birthMonth');
    for(let i=1; i<=12; i++) mSelect.add(new Option(i, i));
    mSelect.value = currentMonth;

    const dSelect = document.getElementById('birthDay');
    for(let i=1; i<=31; i++) dSelect.add(new Option(i, i));
    dSelect.value = currentDay;

    document.getElementById('seirekiIn').value = currentYear;
    syncFromSeireki();
};

function syncFromSeireki() {
    const sYear = Number(document.getElementById('seirekiIn').value);
    if (!sYear) return;
    for (const g of GENGO_CONFIG) {
        if (sYear >= g.start) {
            document.getElementById('gengoIn').value = g.key;
            document.getElementById('warekiYearIn').value = sYear - g.start + 1;
            break;
        }
    }
    updateAll();
}

function syncFromWareki() {
    const gKey = document.getElementById('gengoIn').value;
    const wYear = Number(document.getElementById('warekiYearIn').value);
    const g = GENGO_CONFIG.find(item => item.key === gKey);
    document.getElementById('seirekiIn').value = g.start + wYear - 1;
    updateAll();
}

function updateAll() {
    const sYear = Number(document.getElementById('seirekiIn').value);
    const sMonth = Number(document.getElementById('birthMonth').value);
    const sDay = Number(document.getElementById('birthDay').value);
    if(!sYear) return;

    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const birthDate = new Date(sYear, sMonth - 1, sDay);

    // 1. 年齢
    let age = now.getFullYear() - sYear;
    if (now.getMonth() + 1 < sMonth || (now.getMonth() + 1 === sMonth && now.getDate() < sDay)) age--;
    document.getElementById('resAge').textContent = age >= 0 ? age + " 歳" : "未誕生";

    // 2. 経過日数
    if (birthDate <= today) {
        const diffTime = today - birthDate;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1; 
        document.getElementById('resDays').textContent = diffDays.toLocaleString() + " 日目";
    } else {
        document.getElementById('resDays').textContent = "未来";
    }

    // 3. 干支
    document.getElementById('resEto').textContent = ETO_LIST[sYear % 12] + "年";

    // 4. 星座判定 (修正済みロジック)
    // 誕生日の日が、その月の切り替え日より前なら「前月の星座」、後なら「その月の星座」
    const seiza = (sDay < ZODIAC_SPLIT_DAYS[sMonth - 1]) ? ZODIACS[sMonth - 1] : ZODIACS[sMonth];
    document.getElementById('resSeiza').textContent = seiza;

    // 5. 学歴
    const isHayaumare = (sMonth < 4) || (sMonth === 4 && sDay === 1);
    const schoolBaseYear = isHayaumare ? sYear : sYear + 1;
    const schools = [
        { name: "小学校", in: 6, out: 12 }, { name: "中学校", in: 12, out: 15 },
        { name: "高校", in: 15, out: 18 }, { name: "大学", in: 18, out: 22 }
    ];
    let html = "";
    schools.forEach(s => {
        const inY = schoolBaseYear + s.in;
        const outY = schoolBaseYear + s.out;
        html += `<tr><td>${s.name}</td><td>${inY}年<span class="sub">${getWarekiStr(inY)}</span></td><td>${outY}年<span class="sub">${getWarekiStr(outY)}</span></td></tr>`;
    });
    document.getElementById('schoolTable').innerHTML = html;
}

function getWarekiStr(y) {
    for (const g of GENGO_CONFIG) {
        if (y >= g.start) {
            const w = y - g.start + 1;
            return g.name + (w === 1 ? "元" : w) + "年";
        }
    }
    return "";
}
</script>

</body>
</html>
